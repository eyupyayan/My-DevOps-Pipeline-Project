apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "my-devops-app.fullname" . }}-config
  namespace: {{ .Values.namespace }}
data:
  APP_NAME: {{ .Values.config.appName | quote }}
  APP_ENV: {{ .Values.config.appEnv | quote }}
  APP_VERSION: {{ .Values.config.appVersion | quote }}
  MESSAGE: {{ .Values.config.message | quote }}